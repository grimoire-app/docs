<style>
  :root{
    --void:#0d0b0a;
    --panel:#1a1614;
    --gold:#c9a84c;
    --gold-dim:#a88e44;
    --gold-bright:#e8c95a;
    --amber:#d4913a;
    --text:#e8e0d4;
    --text-dim:#b8ab9b;
    --muted:#968879;
    --border:#3a322a;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }

  body{
    min-height:100svh;
    font-family:'Alegreya Sans', system-ui, sans-serif;
    color:var(--text);
    background:
      radial-gradient(ellipse 68% 52% at 50% 36%, rgba(201,168,76,0.12), transparent 60%),
      radial-gradient(ellipse 95% 60% at 50% 120%, rgba(45,33,22,0.65), transparent 62%),
      var(--void);
    display:flex; align-items:center; justify-content:center;
    padding:clamp(1.5rem, 5vw, 4rem);
    overflow:hidden;
    position:relative;
  }

  /* deepen the edges like a worn cover */
  .vignette{
    position:fixed; inset:0; z-index:0; pointer-events:none;
    background:radial-gradient(ellipse 76% 76% at 50% 45%, transparent 50%, rgba(5,3,2,0.66) 100%);
  }

  /* inset border framing the tome's cover */
  .frame{
    position:fixed; inset:clamp(14px,2.2vw,26px); z-index:4; pointer-events:none;
    border:1px solid rgba(201,168,76,0.16);
    opacity:0; animation:fade 1.6s ease forwards;
  }

  /* drifting candle motes */
  .motes{ position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden; }
  .mote{
    position:absolute; bottom:-10%;
    width:5px; height:5px; border-radius:50%;
    background:radial-gradient(circle, rgba(232,201,90,0.7), rgba(232,201,90,0) 70%);
    filter:blur(0.5px); opacity:0;
    animation:drift linear infinite;
  }
  .mote:nth-child(1){ left:18%; animation-duration:26s; animation-delay:0s; }
  .mote:nth-child(2){ left:42%; animation-duration:34s; animation-delay:-9s; width:4px; height:4px; }
  .mote:nth-child(3){ left:63%; animation-duration:22s; animation-delay:-4s; }
  .mote:nth-child(4){ left:82%; animation-duration:38s; animation-delay:-14s; width:6px; height:6px; }

  main{
    position:relative; z-index:2;
    text-align:center;
    display:flex; flex-direction:column; align-items:center;
    max-width:40rem;
  }

  /* ---- the crest: app logo framed by a turning rune ring ---- */
  .crest{
    position:relative;
    width:clamp(176px, 34vw, 248px);
    aspect-ratio:1;
    margin-bottom:clamp(1.5rem, 3vw, 2.3rem);
    opacity:0;
    animation:draw 1.8s cubic-bezier(.2,.7,.2,1) .1s forwards;
  }
  .crest .glow{
    position:absolute; inset:14%;
    border-radius:50%;
    background:radial-gradient(circle, rgba(201,168,76,0.28), rgba(201,168,76,0) 66%);
    filter:blur(9px);
    animation:breathe 7s ease-in-out infinite;
  }
  .crest svg{
    position:absolute; inset:0;
    width:100%; height:100%;
    color:var(--gold);
    filter:drop-shadow(0 0 5px rgba(201,168,76,0.35));
    overflow:visible;
  }
  .crest .logo{
    position:absolute; top:50%; left:50%;
    width:48%;
    transform:translate(-50%,-50%);
    filter:drop-shadow(0 0 7px rgba(13,11,10,0.7)) drop-shadow(0 3px 9px rgba(0,0,0,0.55));
  }
  .ring-spin{ transform-box:fill-box; transform-origin:center; }
  .spin-a{ animation:spin 96s  linear infinite reverse; }
  .spin-b{ animation:spin 132s linear infinite; }
  .spin-c{ animation:spin 74s  linear infinite; }

  /* ---- type ---- */
  .eyebrow{
    font-family:'Alegreya Sans', sans-serif;
    font-size:clamp(.66rem,1.6vw,.78rem);
    font-weight:500;
    letter-spacing:.4em;
    text-transform:uppercase;
    color:var(--gold);
    padding-left:.4em;
    margin-bottom:clamp(.55rem,1.5vw,.85rem);
    opacity:0; animation:rise .9s ease .95s forwards;
  }

  h1{
    font-family:'Cinzel', serif;
    font-weight:600;
    font-size:clamp(2.5rem, 9.5vw, 5.1rem);
    letter-spacing:.16em;
    line-height:1;
    padding-left:.16em;
    background:linear-gradient(178deg, #f3e8c9 14%, var(--gold) 96%);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    filter:drop-shadow(0 0 22px rgba(201,168,76,0.2));
    opacity:0; animation:rise 1s ease 1.1s forwards;
  }

  .tagline{
    font-size:clamp(1.02rem, 2.6vw, 1.24rem);
    color:var(--text-dim);
    line-height:1.55;
    max-width:30rem;
    margin-top:clamp(.9rem,2vw,1.2rem);
    opacity:0; animation:rise 1s ease 1.3s forwards;
  }

  /* ---- divider ---- */
  .divider{
    display:flex; align-items:center; justify-content:center; gap:.85rem;
    margin:clamp(1.7rem,3.4vw,2.4rem) 0 clamp(1.5rem,3vw,2rem);
    width:min(15rem, 70%);
    opacity:0; animation:fade 1s ease 1.5s forwards;
  }
  .divider .line{ height:1px; flex:1; background:linear-gradient(90deg, transparent, rgba(201,168,76,0.5)); }
  .divider .line:last-child{ background:linear-gradient(90deg, rgba(201,168,76,0.5), transparent); }
  .divider .pip{
    width:7px; height:7px; flex:none;
    background:var(--gold); transform:rotate(45deg);
    box-shadow:0 0 8px rgba(201,168,76,0.55);
  }

  /* ---- documentation link ---- */
  .doc{
    font-family:'Alegreya Sans', sans-serif;
    font-size:clamp(.8rem,1.9vw,.92rem);
    font-weight:500;
    letter-spacing:.26em;
    text-transform:uppercase;
    text-decoration:none;
    color:var(--gold-bright);
    padding:.85em 2.1em .85em 2.36em;
    border:1px solid rgba(201,168,76,0.45);
    background:rgba(201,168,76,0.04);
    transition:color .35s ease, border-color .35s ease, background .35s ease, box-shadow .35s ease, transform .35s ease;
    opacity:0; animation:rise 1s ease 1.65s forwards;
  }
  .doc:hover, .doc:focus-visible{
    color:#fff4d6;
    border-color:rgba(232,201,90,0.95);
    background:rgba(201,168,76,0.1);
    box-shadow:0 0 26px rgba(201,168,76,0.26), inset 0 0 18px rgba(201,168,76,0.08);
    transform:translateY(-1px);
  }

  /* ---- icon row ---- */
  .links{
    display:flex; gap:clamp(1.1rem,3vw,1.7rem);
    margin-top:clamp(1.8rem,3.6vw,2.5rem);
    opacity:0; animation:rise 1s ease 1.85s forwards;
  }
  .links a{
    display:grid; place-items:center;
    width:44px; height:44px;
    color:var(--muted);
    border-radius:50%;
    transition:color .3s ease, transform .3s ease, box-shadow .3s ease, background .3s ease;
  }
  .links svg{ width:23px; height:23px; fill:currentColor; }
  .links a:hover, .links a:focus-visible{
    color:var(--gold-bright);
    transform:translateY(-3px);
    background:radial-gradient(circle, rgba(201,168,76,0.12), transparent 70%);
    box-shadow:0 0 18px rgba(201,168,76,0.18);
  }

  a:focus-visible{ outline:none; }
  .doc:focus-visible{ outline:2px solid rgba(232,201,90,0.7); outline-offset:3px; }
  .links a:focus-visible{ outline:2px solid rgba(232,201,90,0.7); outline-offset:2px; }

  /* ---- motion ---- */
  @keyframes spin{ to{ transform:rotate(360deg); } }
  @keyframes breathe{ 0%,100%{ opacity:.5; transform:scale(.97);} 50%{ opacity:1; transform:scale(1.03);} }
  @keyframes rise{ from{ opacity:0; transform:translateY(14px);} to{ opacity:1; transform:none;} }
  @keyframes fade{ from{ opacity:0;} to{ opacity:1;} }
  @keyframes draw{ from{ opacity:0; transform:scale(.86) rotate(-7deg);} to{ opacity:1; transform:none;} }
  @keyframes drift{
    0%{ transform:translateY(0) translateX(0); opacity:0; }
    12%{ opacity:.36; }
    88%{ opacity:.32; }
    100%{ transform:translateY(-118svh) translateX(22px); opacity:0; }
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation:none !important; }
    .crest,.eyebrow,h1,.tagline,.divider,.doc,.links,.frame{ opacity:1 !important; transform:none !important; }
    .crest .logo{ transform:translate(-50%,-50%) !important; }
    .mote{ display:none; }
  }
</style>
</head>
